---
layout: default
permalink: /blog/
title: Blog
---

<div class="blog-container">
    <div class="offset"></div>
    <section class="blog-section">
        <h1 class="blog-title">{{ page.title }}</h1>
        <div class="blog-content">
            <p>Hi.. Welcome to my blog! Please see the latest posts below: </p>

            {% for post in site.posts %}
                <a href="{{ post.url }}">
                    <div class="post">
                        <h4 class="post-title">{{ post.title }}</h4>
                        <p class="post-snippet">{{ post.excerpt | truncate: 50 }}</p>
                    </div>
                </a>
            {% endfor %}
        </div>
    </section>
</div>
